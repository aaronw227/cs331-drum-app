<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Trainer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">🥁</span>
      <a href="#/home" class="brand-name">Drum Trainer</a>
    </div>
    <nav class="app-nav">
      <a href="#/home" data-route="home">Home</a>
      <a href="#/exercises" data-route="exercises">Exercises</a>
      <a href="#/metronome" data-route="metronome">Metronome</a>
      <a href="#/progress" data-route="progress">Progress</a>
    </nav>
  </header>

  <div id="mic-banner" class="mic-banner hidden">
    <span id="mic-banner-text">Microphone access needed for hit detection.</span>
    <button id="mic-enable">Enable Microphone</button>
  </div>

  <main id="view" class="view"></main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
